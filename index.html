<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>SOM2MUSIC</title>
<link rel="manifest" href="manifest.json">
<style>

  :root {
    --bg: #FAFAF8; --ink: #2B2B28; --sub: #8A8578; --line: #EAE7DD;
    --card: #FFFFFF; --accent: #B13A2F; --accent-soft: #F5E9E7; --muted: #9C9A8E;

  html, body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); background: var(--bg); }
  body { min-height: 100vh; padding-bottom: 150px; }
  #player-host { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; left: -9999px; }

  .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 32px 24px 20px; transition: background 0.6s; }
  .brand { font-size: 12px; letter-spacing: 0.12em; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
  .title { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
  .title-sm { font-size: 22px; font-weight: 700; }
  .subtitle { font-size: 13px; color: #71705f; margin-top: 4px; }
  .refresh-btn { border: 1px solid var(--line); background: var(--card); border-radius: 50%; width: 40px; height: 40px;
    font-size: 18px; color: var(--accent); cursor: pointer; font-family: inherit; display: flex; align-items: center;
    justify-content: center; padding: 0; }
  .refresh-btn:active { transform: rotate(180deg); transition: transform 0.4s; }

  .main { padding: 8px 24px 24px; }
  .section + .section { margin-top: 28px; }
  .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .section-label { font-size: 13px; font-weight: 600; color: var(--sub); }
  .track-list { display: flex; flex-direction: column; gap: 8px; }

  .track-row { display: flex; justify-content: space-between; align-items: center; width: 100%; text-align: left;
    border: none; background: var(--card); border-radius: 14px; padding: 14px 16px; cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04); font-family: inherit; gap: 12px; }
  .track-row.active { background: rgba(177,58,47,0.10); }
  .track-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
  .track-ic { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .track-row.active .track-ic { background: var(--accent); color: #fff; }
  .track-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .track-title { font-size: 15px; font-weight: 600; color: var(--ink); }
  .track-artist { font-size: 12px; color: var(--sub); }
  .playing-dot { color: var(--accent); font-size: 10px; }
  .tag-warn { font-size: 11px; color: var(--accent); font-weight: 500; }

  .empty { font-size: 13px; color: #A6A398; padding: 24px 0; text-align: center; line-height: 1.6; }

  .search-input { width: 100%; border: 1px solid var(--line); background: var(--card); border-radius: 14px;
    padding: 14px 16px; font-size: 15px; margin-bottom: 10px; outline: none; font-family: inherit; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-chip { border: 1px solid var(--line); background: var(--card); color: #71705f; font-size: 12px;
    font-weight: 600; padding: 7px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; }
  .filter-chip.on { border: none; background: var(--ink); color: var(--bg); }

  .genre-row { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 18px; -webkit-overflow-scrolling: touch; }
  .genre-row::-webkit-scrollbar { display: none; }
  .genre-chip { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    border: 1px solid var(--line); background: var(--card); color: var(--ink); font-size: 13px;
    font-weight: 600; padding: 8px 16px; border-radius: 16px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .genre-chip-situation { font-size: 10px; font-weight: 600; color: var(--muted); }
  .genre-chip:active { background: var(--accent-soft); border-color: var(--accent); }
  .genre-hint { font-size: 11px; color: var(--muted); margin: -10px 0 18px; }

  .genre-edit-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex;
    align-items: center; justify-content: center; z-index: 200; padding: 24px; }
  .genre-edit-card { background: var(--card); border-radius: 16px; padding: 20px; width: 100%; max-width: 320px; }
  .genre-edit-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 14px; line-height: 1.5; }
  .genre-edit-card input { width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
    font-size: 14px; font-family: inherit; outline: none; margin-bottom: 14px; }
  .genre-edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .genre-edit-actions button { border: none; border-radius: 10px; padding: 9px 16px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit; }
  .genre-edit-cancel { background: var(--accent-soft); color: #71705f; }
  .genre-edit-save { background: var(--accent); color: #fff; }

  .today-story { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 24px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .today-story-head { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .today-story-event { font-size: 13px; color: var(--ink); line-height: 1.6; margin-bottom: 8px; }
  .today-story-quote { font-size: 13px; color: #71705f; line-height: 1.6; border-top: 1px solid var(--line); padding-top: 8px; }
  .today-story-author { color: var(--muted); }

  .search-row { display: flex; align-items: center; gap: 8px; }
  .search-row-main { flex: 1; display: flex; text-align: left; border: none; background: var(--card);
    border-radius: 14px; padding: 16px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.04); min-width: 0; font-family: inherit; }
  .search-row-main.active { background: rgba(177,58,47,0.10); }
  .add-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--line); background: var(--card);

  .add-wrap { position: relative; }
  .add-dropdown { position: absolute; right: 0; top: 46px; background: var(--card); border-radius: 12px;

  .add-dropdown button { display: block; width: 100%; text-align: left; border: none; background: none;
    font-size: 14px; padding: 11px 12px; border-radius: 8px; cursor: pointer; color: var(--ink); font-family: inherit; }
  .add-dropdown .dd-empty { font-size: 12px; color: #A6A398; padding: 8px 10px; }

  .list-row { display: flex; justify-content: space-between; align-items: center; width: 100%; text-align: left;
    border: none; background: var(--card); border-radius: 14px; padding: 18px 16px; cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04); font-family: inherit; }
  .add-list-btn { width: 100%; border: 1px dashed #C9C5B8; background: none; border-radius: 14px; padding: 16px;
    font-size: 14px; font-weight: 600; color: var(--sub); cursor: pointer; margin-top: 10px; font-family: inherit; }
  .new-list-row { display: flex; gap: 8px; margin-top: 10px; }
  .new-list-row input { flex: 1; border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px;
    font-size: 14px; outline: none; font-family: inherit; }
  .new-list-row button { border: none; background: var(--ink); color: var(--bg); border-radius: 12px;
    padding: 0 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }

  .back-btn { border: none; background: none; font-size: 13px; color: var(--sub); cursor: pointer;
    padding: 0 0 14px; font-weight: 600; font-family: inherit; }
  .row-with-delete { display: flex; align-items: center; gap: 8px; }
  .row-inner { flex: 1; display: flex; text-align: left; border: none; background: var(--card); border-radius: 14px;
    padding: 18px 16px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.04); min-width: 0; font-family: inherit; }
  .row-inner.active { background: rgba(177,58,47,0.10); }
  .del-btn { border: none; background: none; color: #B0563D; font-size: 12px; font-weight: 600; cursor: pointer;
    flex-shrink: 0; padding: 10px; font-family: inherit; }
  .del-list-btn { width: 100%; border: none; background: none; color: #B0563D; font-size: 13px; font-weight: 600;
    cursor: pointer; margin-top: 18px; padding: 10px; font-family: inherit; }

  .player-bar { position: fixed; bottom: 72px; left: 0; right: 0; background: rgba(255,255,255,0.94);
    backdrop-filter: blur(12px); border-top: 1px solid var(--line); cursor: pointer; }
  .progress-track { height: 3px; background: var(--line); position: relative; }
  .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); transition: width 0.3s linear; }
  .player-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 18px; }
  .now-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .now-artist { font-size: 11px; color: var(--sub); }
  .controls { display: flex; align-items: center; gap: 16px; }
  .ctrl { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--ink); }
  .ctrl-main { border: none; background: var(--accent); color: #fff; width: 44px; height: 44px; border-radius: 50%;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 72px; background: var(--card);
    border-top: 1px solid var(--line); display: flex; padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 30; }
  .bottom-nav button { flex: 1; border: none; background: none; display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--muted); }
  .bottom-nav button.on { color: var(--ink); font-weight: 700; }

  .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); background: var(--ink);
    color: var(--bg); font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 20px; z-index: 80;
    opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .loading { font-size: 13px; color: var(--sub); padding: 24px 0; text-align: center; }

  /* 큰 재생 화면 */
  .np-screen { position: fixed; inset: 0; background: var(--bg); z-index: 60; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
  .np-screen.open { transform: translateY(0); }
  .np-top { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 8px; }
  .np-close { border: none; background: none; font-size: 26px; color: var(--ink); cursor: pointer; line-height: 1; }
  .np-top-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--sub); }
  .np-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 32px; overflow-y: auto; }
  .np-art { width: 100%; max-width: 320px; aspect-ratio: 1/1; border-radius: 24px; overflow: hidden;
    background: #E8E5DC; box-shadow: 0 12px 40px rgba(0,0,0,0.16); display: flex; align-items: center; justify-content: center; }
  .np-art img { width: 100%; height: 100%; object-fit: cover; }
  .np-art .np-art-fallback { font-size: 64px; color: #C9C5B8; }
  .np-meta { width: 100%; max-width: 320px; margin-top: 28px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .np-song { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .np-singer { font-size: 14px; color: var(--sub); margin-top: 4px; }
  .np-like { border: none; background: none; cursor: pointer; font-size: 24px; flex-shrink: 0; padding: 2px; line-height: 1; }

  .np-progress { width: 100%; max-width: 320px; margin-top: 24px; }
  .np-bar { height: 4px; background: var(--line); border-radius: 2px; position: relative; cursor: pointer; }
  .np-bar-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); border-radius: 2px; }
  .np-bar-knob { position: absolute; top: 50%; width: 12px; height: 12px; background: var(--accent); border-radius: 50%;
    transform: translate(-50%, -50%); }
  .np-time { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); margin-top: 8px; }

  .np-controls { width: 100%; max-width: 320px; margin-top: 24px; display: flex; align-items: center; justify-content: space-between; }
  .np-cbtn { border: none; background: none; cursor: pointer; color: var(--ink); display: flex; align-items: center; justify-content: center; }
  .np-cbtn.side { font-size: 22px; color: var(--sub); }
  .np-cbtn.skip { font-size: 28px; }
  .np-play { width: 68px; height: 68px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 24px;
    box-shadow: 0 8px 20px rgba(177,58,47,0.30); }
  .np-cbtn.on { color: var(--accent); }

  .np-wave { display: flex; align-items: center; justify-content: center; gap: 3px; height: 40px; margin-top: 28px; width: 100%; max-width: 320px; }
  .np-wave span { width: 3px; background: var(--accent); border-radius: 2px; opacity: 0.45; }
  .np-wave.playing span { animation: wave 1s ease-in-out infinite; opacity: 0.85; }
  @keyframes wave { 0%,100% { height: 8px; } 50% { height: 32px; } }
</style>
</head>
<body>
<div id="player-host"></div>
<div id="toast" class="toast"></div>

<header class="header" id="header">
  <div>
    <div class="brand">SOM2MUSIC</div>
    <div id="header-content"></div>
  </div>
  <div id="header-action"></div>
</header>

<main class="main" id="main"></main>
<div id="player-bar"></div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="np-screen" id="np-screen"></div>

<script>
// ⬇⬇⬇ 여기에 본인의 YouTube Data API 키를 붙여넣으세요 ⬇⬇⬇
const YOUTUBE_API_KEY = "AIzaSyByOiNtafI7cRU-rJH39d3AcYOdwWcTnVY";
// ⬆⬆⬆ 예: const YOUTUBE_API_KEY = "AIzaSyB1a2c3..."; ⬆⬆⬆

const MOOD_BY_TIME = {
  morning: { label: '맑은 아침', emoji: '\u2600\uFE0F', tint: '#F4D58D',
    queries: ['상쾌한 아침 팝송', '기분 좋은 시티팝', '경쾌한 어쿠스틱', '활기찬 인디팝', '산뜻한 보사노바'] },
  evening: { label: '노을', emoji: '\uD83C\uDF06', tint: '#E8A87C',
    queries: ['감성 알앤비', '잔잔한 인디', '편안한 재즈', '노을 발라드', '로파이 힙합'] },
  night: { label: '밤', emoji: '\uD83C\uDF19', tint: '#7E94A8',
    queries: ['차분한 발라드', '몽환적인 시티팝', '잔잔한 피아노곡', '새벽 감성 알앤비', '편안한 재즈 발라드'] },
};

const EXCLUDE_KEYWORDS = ['cover','커버','live','라이브','lyrics','가사','remix','리믹스','모음','compilation','1시간','mix','매시업','mashup','reaction','리액션','노래방','mr','inst'];

// 상황별 장르 후보군. 매일 상황당 하나씩 랜덤으로 뽑혀서 그날의 장르 칩이 돼요.
const SITUATIONS = [
  { label: '공부할 때', icon: '\uD83D\uDCDA', options: [
    { id: 'kpop', label: 'K-pop', icon: '\uD83C\uDFA4', queries: ['케이팝 히트곡', 'K-pop 인기곡'] },
    { id: 'pop', label: '팝', icon: '\uD83C\uDFB6', queries: ['팝송 인기차트', '팝 플레이리스트'] },
    { id: 'indie', label: '인디', icon: '\uD83C\uDFB8', queries: ['인디음악 추천', '인디밴드 플레이리스트'] },
  ]},
  { label: '출퇴근', icon: '\uD83D\uDE87', options: [
    { id: 'ballad', label: '발라드', icon: '\uD83C\uDF99\uFE0F', queries: ['발라드 명곡', '감성 발라드'] },
    { id: 'acoustic_commute', label: '어쿠스틱', icon: '\uD83C\uDFB5', queries: ['어쿠스틱 플레이리스트', '잔잔한 통기타 연주'] },
    { id: 'hiphop', label: '힙합', icon: '\uD83C\uDFA7', queries: ['힙합 플레이리스트', '한국힙합 인기곡'] },
  ]},
  { label: '운동할 때', icon: '\uD83D\uDCAA', options: [
    { id: 'rock', label: '락', icon: '\uD83C\uDFB8', queries: ['락 명곡', '락 플레이리스트'] },
    { id: 'dance', label: '댄스', icon: '\uD83D\uDC83', queries: ['댄스 팝 플레이리스트', '신나는 댄스곡'] },
    { id: 'trap', label: '트랩', icon: '\uD83D\uDD0A', queries: ['트랩 비트', 'trap music playlist'] },
  ]},
  { label: '쉬는 시간', icon: '\u2615', options: [
    { id: 'bossa', label: '보사노바', icon: '\uD83C\uDFB8', queries: ['보사노바 연주곡', '브라질 재즈'] },
    { id: 'acoustic_rest', label: '어쿠스틱', icon: '\uD83C\uDFB5', queries: ['어쿠스틱 플레이리스트', '잔잔한 통기타 연주'] },
    { id: 'classical', label: '클래식', icon: '\uD83C\uDFBB', queries: ['클래식 명곡', '오케스트라 연주곡'] },
    { id: 'jazz', label: '재즈', icon: '\uD83C\uDFB7', queries: ['재즈 스탠다드', '재즈 보컬'] },
  ]},
];

function todayKey() {
  const now = new Date();
  return `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
}
function seededRandom(seed) { const x = Math.sin(seed) * 10000; return x - Math.floor(x); }
function pickTodayGenres() {
  const seedBase = parseInt(todayKey(), 10);
  return SITUATIONS.map((s, i) => {
    const idx = Math.floor(seededRandom(seedBase + i * 97) * s.options.length);
    return { ...s.options[idx], situation: s.label, situationIcon: s.icon };
  });
}

// 오늘과 관련된 역사적 사건 + 그 순간의 말. 'MM-DD' 형식으로 날짜를 추가하면 그날 이 이야기가 떠요.
const TODAY_STORIES = {
  '07-19': {
    event: '1969년 오늘, 아폴로 11호가 달 궤도에 진입했어요. 사령선 조종사 마이클 콜린스는 홀로 궤도를 돌며 동료들이 착륙하기를 기다렸죠.',
    quote: '모두가 지켜보고 있다는 무게를 느꼈고, 그저 최선을 다하고 싶었다',
    author: '마이클 콜린스',
  },
};
// 오늘 날짜에 등록된 이야기가 없을 때 대신 보여줄 음악 관련 명언들
const FALLBACK_QUOTES = [
  { quote: '음악은 인간 본성이 없어서는 안 될 즐거움을 준다', author: '공자' },
  { quote: '말로 표현할 수 없는 것을, 음악은 표현한다', author: '빅토르 위고' },
  { quote: '음악은 우주에 영혼을, 마음에 날개를, 상상에 비상을 준다', author: '플라톤' },
  { quote: '음악이 없다면 삶은 하나의 오류일 것이다', author: '프리드리히 니체' },
];
function getTodayStory() {
  const now = new Date();
  const key = String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const dateLabel = `${now.getMonth()+1}월 ${now.getDate()}일`;
  const s = TODAY_STORIES[key];
  if (s) return { dateLabel, event: s.event, quote: s.quote, author: s.author };
  const f = FALLBACK_QUOTES[now.getDate() % FALLBACK_QUOTES.length];
  return { dateLabel, event: null, quote: f.quote, author: f.author };
}

let state = {
  view: 'home', mood: MOOD_BY_TIME.morning,
  playlists: [], likes: [], history: {}, artistCount: {},
  activeListId: null, searchInput: '', searchResults: null, searchLoading: false,
  showOnlyOriginal: true, recommended: [], recommendLoading: false,
  forYou: [], forYouLoading: false,
  selectedGenre: null, genreRecommended: [], genreLoading: false,
  genres: pickTodayGenres(), genresDate: todayKey(), genreCache: {},
  queue: [], currentIndex: -1, isPlaying: false, progress: 0, duration: 0,
  openDropdownId: null, npOpen: false, shuffle: false, repeat: false,
};

const STORAGE_KEY = 'som2music_data_v2';
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      playlists: state.playlists, likes: state.likes, history: state.history, artistCount: state.artistCount,
      genres: state.genres, genresDate: state.genresDate,
    }));
  } catch (e) {}
}
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (Array.isArray(d.playlists)) state.playlists = d.playlists;
      if (Array.isArray(d.likes)) state.likes = d.likes;
      if (d.history) state.history = d.history;
      if (d.artistCount) state.artistCount = d.artistCount;
      if (Array.isArray(d.genres) && d.genresDate === todayKey()) { state.genres = d.genres; state.genresDate = d.genresDate; }
      // 저장된 날짜가 오늘과 다르면 state 초기값(오늘자 랜덤 장르)을 그대로 사용
    }
  } catch (e) {}
  if (state.playlists.length === 0) state.playlists = [{ id: 'pl_default1', name: '즐겨듣는 곡', tracks: [] }];
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function classifyTrack(t) {
  const title = (t.title || '').toLowerCase();
  return { ...t, likelyOriginal: !EXCLUDE_KEYWORDS.some(kw => title.includes(kw.toLowerCase())) };
}
function decodeHtml(str) { const x = document.createElement('textarea'); x.innerHTML = str; return x.value; }
function thumbUrl(id) { return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`; }
function fmtTime(s) { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s/60); const sec = Math.floor(s%60).toString().padStart(2,'0'); return `${m}:${sec}`; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function searchYouTube(query, maxResults) {
  if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY.includes('붙여넣')) throw new Error('NO_KEY');
  const q = encodeURIComponent(query); const mr = maxResults || 20;
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=${mr}&q=${q}&key=${YOUTUBE_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err?.error?.message || 'API_ERROR'); }
  const data = await res.json();
  return (data.items||[]).map(item => classifyTrack({
    id: item.id.videoId, title: decodeHtml(item.snippet.title), artist: decodeHtml(item.snippet.channelTitle),
  }));
}

async function loadRecommended() {
  if (state.recommendLoading) return;
  state.recommendLoading = true; render();
  try {
    const queries = shuffle(state.mood.queries).slice(0, 2);
    let all = [];
    for (const q of queries) {
      try { all = all.concat((await searchYouTube(q, 15)).filter(t => t.likelyOriginal)); } catch (e) {}
    }
    const seen = new Set();
    const uniq = all.filter(t => (seen.has(t.id) ? false : (seen.add(t.id), true)));
    state.recommended = shuffle(uniq).slice(0, 7);
  } catch (e) { state.recommended = []; }
  state.recommendLoading = false; render();
}

async function loadGenreRecommended(genreId) {
  const g = state.genres.find(x => x.id === genreId); if (!g) return;
  state.genreLoading = true; render();
  try {
    let all = [];
    for (const q of g.queries.slice(0, 2)) {
      try { all = all.concat((await searchYouTube(q, 15)).filter(t => t.likelyOriginal)); } catch (e) {}
    }
    const seen = new Set();
    const uniq = all.filter(t => (seen.has(t.id) ? false : (seen.add(t.id), true)));
    state.genreRecommended = shuffle(uniq).slice(0, 7);
    state.genreCache[genreId] = state.genreRecommended;
  } catch (e) { state.genreRecommended = []; }
  state.genreLoading = false; render();
}
function selectGenre(id) {
  state.selectedGenre = id; state.view = 'genre';
  const cached = state.genreCache[id];
  if (cached) { state.genreRecommended = cached; render(); return; }
  state.genreRecommended = [];
  loadGenreRecommended(id); render();
}
function refreshGenre() {
  if (!state.selectedGenre) return;
  delete state.genreCache[state.selectedGenre];
  loadGenreRecommended(state.selectedGenre);
}

async function loadForYou() {
  const topArtists = Object.entries(state.artistCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]);
  const seedArtists = topArtists.length ? topArtists : shuffle(state.likes).slice(0,3).map(t=>t.artist);
  if (seedArtists.length === 0) { state.forYou = []; render(); return; }
  state.forYouLoading = true; render();
  try {
    const pick = seedArtists[Math.floor(Math.random()*seedArtists.length)];
    let list = await searchYouTube(pick + ' 노래', 15);
    list = list.filter(t => t.likelyOriginal);
    state.forYou = shuffle(list).slice(0, 5);
  } catch (e) { state.forYou = []; }
  state.forYouLoading = false; render();
}

let ytPlayer = null, ytReady = false;
(function loadYT(){ const tag = document.createElement('script'); tag.src = 'https://www.youtube.com/iframe_api'; document.body.appendChild(tag); })();
window.onYouTubeIframeAPIReady = function () {
  ytPlayer = new YT.Player('player-host', {
    height: '1', width: '1', playerVars: { autoplay: 0, controls: 0 },
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.ENDED) {
          if (state.repeat) playTrackAt(state.queue, state.currentIndex);
          else playNext();
        }
        state.isPlaying = (e.data === YT.PlayerState.PLAYING);
        renderPlayerBar();
        if (state.npOpen) renderNowPlaying();
      },
    },
  });

setInterval(() => {
  if (ytPlayer && ytPlayer.getCurrentTime) {
    try { state.progress = ytPlayer.getCurrentTime()||0; state.duration = ytPlayer.getDuration()||0; updateProgressBar(); } catch (e) {}
  }
}, 500);

function recordPlay(track) {
  if (!track) return;
  state.history[track.id] = (state.history[track.id]||0)+1;
  if (track.artist) state.artistCount[track.artist] = (state.artistCount[track.artist]||0)+1;
  saveData();
}
function playTrackAt(list, index) {
  state.queue = list; state.currentIndex = index;
  const track = list[index];
  if (track && ytPlayer && ytPlayer.loadVideoById) { ytPlayer.loadVideoById(track.id); ytPlayer.playVideo(); recordPlay(track); }
  renderPlayerBar();
  // 검색 화면에선 입력창 포커스 보존을 위해 결과만 갱신
  if (state.view === 'search') renderSearchResults();
  else render();
  if (state.npOpen) renderNowPlaying();
}
function playNext() {
  if (state.currentIndex<0||state.queue.length===0) return;
  if (state.shuffle && state.queue.length > 1) {
    let n; do { n = Math.floor(Math.random()*state.queue.length); } while (n === state.currentIndex);
    playTrackAt(state.queue, n);
  } else playTrackAt(state.queue, (state.currentIndex+1)%state.queue.length);
}
function playPrev() { if (state.currentIndex<0||state.queue.length===0) return; playTrackAt(state.queue, (state.currentIndex-1+state.queue.length)%state.queue.length); }
function togglePlay() { if (!ytPlayer) return; state.isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); }
function seekTo(ratio) { if (ytPlayer && state.duration) ytPlayer.seekTo(state.duration*ratio, true); }
function toggleShuffle() { state.shuffle = !state.shuffle; if (state.npOpen) renderNowPlaying(); }
function toggleRepeat() { state.repeat = !state.repeat; if (state.npOpen) renderNowPlaying(); }

function isLiked(id) { return state.likes.some(t => t.id === id); }
function toggleLike(track) {
  if (!track) return;
  if (isLiked(track.id)) state.likes = state.likes.filter(t => t.id !== track.id);
  else state.likes.push({ id: track.id, title: track.title, artist: track.artist });
  saveData();
  if (state.npOpen) renderNowPlaying();
  render();
}

function addToList(listId, track) {
  const list = state.playlists.find(l => l.id === listId); if (!list) return;
  if (!list.tracks.some(t => t.id === track.id)) { list.tracks.push({ id: track.id, title: track.title, artist: track.artist }); saveData(); }
  showToast(`"${list.name}"에 추가했어요`); state.openDropdownId = null;
  if (state.view === 'search') renderSearchResults(); else render();
}
function removeFromList(listId, trackId) {
  const list = state.playlists.find(l => l.id === listId); if (!list) return;
  list.tracks = list.tracks.filter(t => t.id !== trackId); saveData(); render();
}
function createList(name) {
  if (!name.trim()) return;
  state.playlists.push({ id: 'pl_'+Date.now(), name: name.trim(), tracks: [] }); saveData();
  showToast(`"${name.trim()}" 리스트를 만들었어요`); render();

function wireGenreChips() {
  document.querySelectorAll('.genre-chip').forEach((btn) => {
    const idx = parseInt(btn.getAttribute('data-idx'), 10);
    let timer = null, longPressed = false;
    const start = () => { longPressed = false; clearTimeout(timer); timer = setTimeout(() => { longPressed = true; openGenreEditor(idx); }, 500); };
    const cancel = () => { clearTimeout(timer); };
    const end = () => { clearTimeout(timer); if (!longPressed) selectGenre(state.genres[idx].id); };
    btn.addEventListener('touchstart', start, {passive:true});
    btn.addEventListener('touchend', end);
    btn.addEventListener('touchcancel', cancel);
    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', end);
    btn.addEventListener('mouseleave', cancel);
  });
}

function openGenreEditor(idx) {
  const g = state.genres[idx];
  const overlay = document.createElement('div');
  overlay.className = 'genre-edit-overlay';
  overlay.innerHTML = `<div class="genre-edit-card">
    <div class="genre-edit-title">"${esc(g.label)}" 대신 어떤 장르를 넣을까요?</div>
    <input id="genre-edit-input" placeholder="예: 시티팝, 록, 발라드, 로파이">
    <div class="genre-edit-actions"><button class="genre-edit-cancel" type="button">취소</button><button class="genre-edit-save" type="button">저장</button></div>
  </div>`;
  document.body.appendChild(overlay);
  const inp = overlay.querySelector('#genre-edit-input'); inp.focus();
  const close = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('.genre-edit-cancel').onclick = close;
  const save = () => {
    const label = inp.value.trim();
    if (!label) return;
    state.genres[idx] = { id: 'custom_'+Date.now(), label, icon: '\uD83C\uDFB5', queries: [label, label+' 플레이리스트', label+' 추천곡'] };
    saveData(); close(); render();
  };
  overlay.querySelector('.genre-edit-save').onclick = save;
  inp.onkeydown = (e) => { if (e.key === 'Enter') save(); };
}

}
function searchRowHtml(t, active, i) {
  const open = state.openDropdownId === t.id; let dd = '';
  if (open) {
    dd = `<div class="add-dropdown">`;
    if (state.playlists.length === 0) dd += `<div class="dd-empty">리스트를 먼저 만들어주세요</div>`;

  }
  return `<div class="search-row"><button class="search-row-main ${active?'active':''}" onclick="playFromSearch(${i})"><div class="track-info"><div class="track-title">${esc(t.title)}${!t.likelyOriginal?'<span class="tag-warn"> · 원곡 아닐 수 있음</span>':''}</div><div class="track-artist">${esc(t.artist)}</div></div></button><div class="add-wrap"><button class="add-btn" onclick="toggleDropdown('${t.id}')">+</button>${dd}</div></div>`;
}
function escAttr(t) { return JSON.stringify({ id: t.id, title: t.title, artist: t.artist }).replace(/"/g,'&quot;'); }

// 검색 결과 영역만 HTML 생성 (입력창은 건드리지 않음)
function searchResultsHtml(cur) {
  cur = cur || (state.currentIndex >= 0 ? state.queue[state.currentIndex] : null);
  if (state.searchLoading) return `<div class="loading">검색 중…</div>`;
  if (!state.searchResults) return '';
  const vis = state.showOnlyOriginal ? state.searchResults.filter(t=>t.likelyOriginal) : state.searchResults;
  if (vis.length === 0) return `<div class="empty">결과가 없어요.</div>`;
  let h = `<div class="track-list">`;
  vis.forEach((t,i)=>{ h += searchRowHtml(t, cur&&cur.id===t.id, i); });
  h += `</div>`;
  return h;
}
// 검색 결과 영역만 다시 그리기 (전체 render 대신 — 입력 포커스 유지)
function renderSearchResults() {
  const box = document.getElementById('search-results');
  if (box) box.innerHTML = searchResultsHtml();
}

function renderNav() {
  const nav = document.getElementById('bottom-nav');
  const tabs = [{key:'home',label:'홈'},{key:'search',label:'검색'},{key:'lists',label:'내 리스트'}];
  nav.innerHTML = tabs.map(t => {
    const on = state.view===t.key || (t.key==='lists' && (state.view==='listDetail'||state.view==='likes')) || (t.key==='home' && state.view==='genre');
    return `<button class="${on?'on':''}" onclick="go('${t.key}')">${t.label}</button>`;
  }).join('');
}

function renderPlayerBar() {
  const bar = document.getElementById('player-bar');
  const cur = state.currentIndex >= 0 ? state.queue[state.currentIndex] : null;
  if (!cur) { bar.innerHTML = ''; return; }
  const pct = state.duration ? (state.progress/state.duration)*100 : 0;
  bar.innerHTML = `<div class="player-bar" onclick="openNowPlaying()"><div class="progress-track"><div class="progress-fill" id="pfill" style="width:${pct}%"></div></div><div class="player-row"><div class="now-playing"><div class="now-title">${esc(cur.title)}</div><div class="now-artist">${esc(cur.artist)}</div></div><div class="controls" onclick="event.stopPropagation()"><button class="ctrl" onclick="playPrev()">⏮</button><button class="ctrl-main" onclick="togglePlay()">${state.isPlaying?'⏸':'▶'}</button><button class="ctrl" onclick="playNext()">⏭</button></div></div></div>`;
}
function updateProgressBar() {
  const pct = state.duration ? (state.progress/state.duration)*100 : 0;
  const fill = document.getElementById('pfill'); if (fill) fill.style.width = pct+'%';
  if (state.npOpen) {
    const nf = document.getElementById('np-fill'); if (nf) nf.style.width = pct+'%';
    const nk = document.getElementById('np-knob'); if (nk) nk.style.left = pct+'%';
    const ct = document.getElementById('np-cur'); if (ct) ct.textContent = fmtTime(state.progress);
    const dt = document.getElementById('np-dur'); if (dt) dt.textContent = fmtTime(state.duration);
  }
}

function openNowPlaying() {
  if (state.currentIndex < 0) return;
  state.npOpen = true; renderNowPlaying();
  document.getElementById('np-screen').classList.add('open');
}
function closeNowPlaying() { state.npOpen = false; document.getElementById('np-screen').classList.remove('open'); }
function renderNowPlaying() {
  const el = document.getElementById('np-screen');
  const cur = state.currentIndex >= 0 ? state.queue[state.currentIndex] : null;
  if (!cur) { el.innerHTML = ''; return; }
  const pct = state.duration ? (state.progress/state.duration)*100 : 0;
  const liked = isLiked(cur.id);
  const bars = Array.from({length:28}, (_,i)=>`<span style="height:${8+(i%5)*5}px; animation-delay:${(i%7)*0.1}s"></span>`).join('');
  el.innerHTML = `
    <div class="np-top"><button class="np-close" onclick="closeNowPlaying()">⌄</button><div class="np-top-label">지금 재생 중</div><div style="width:26px"></div></div>
    <div class="np-body">
      <div class="np-art"><img src="${thumbUrl(cur.id)}" onerror="this.style.display='none';this.parentNode.innerHTML='<div class=\\'np-art-fallback\\'>♪</div>'"></div>
      <div class="np-meta"><div style="min-width:0"><div class="np-song">${esc(cur.title)}</div><div class="np-singer">${esc(cur.artist)}</div></div><button class="np-like" onclick="toggleLike(${escAttr(cur)})">${liked?'❤️':'🤍'}</button></div>
      <div class="np-progress"><div class="np-bar" onclick="npSeek(event)"><div class="np-bar-fill" id="np-fill" style="width:${pct}%"></div><div class="np-bar-knob" id="np-knob" style="left:${pct}%"></div></div><div class="np-time"><span id="np-cur">${fmtTime(state.progress)}</span><span id="np-dur">${fmtTime(state.duration)}</span></div></div>
      <div class="np-controls"><button class="np-cbtn side ${state.shuffle?'on':''}" onclick="toggleShuffle()">⤨</button><button class="np-cbtn skip" onclick="playPrev()">⏮</button><button class="np-cbtn np-play" onclick="togglePlay()">${state.isPlaying?'⏸':'▶'}</button><button class="np-cbtn skip" onclick="playNext()">⏭</button><button class="np-cbtn side ${state.repeat?'on':''}" onclick="toggleRepeat()">⟲</button></div>
      <div class="np-wave ${state.isPlaying?'playing':''}">${bars}</div>
    </div>`;
}
function npSeek(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width));
  seekTo(ratio);
}

function go(view) {
  state.view = view; state.openDropdownId = null;
  if (view === 'home') {
    if (state.recommended.length === 0 && !state.recommendLoading) loadRecommended();
    if (state.forYou.length === 0 && !state.forYouLoading) loadForYou();
  }
  render();
}
function refreshRecommend() { loadRecommended(); loadForYou(); }
function openList(id) { state.activeListId = id; state.view = 'listDetail'; render(); }
function openLikes() { state.view = 'likes'; render(); }
function playFromSearch(i) { const vis = state.showOnlyOriginal ? state.searchResults.filter(t=>t.likelyOriginal) : state.searchResults; playTrackAt(vis, i); }
function playFromList(listId, i) { const l = state.playlists.find(x=>x.id===listId); if (l) playTrackAt(l.tracks, i); }
function playFromLikes(i) { playTrackAt(state.likes, i); }
function toggleOriginal() {
  state.showOnlyOriginal = !state.showOnlyOriginal;
  if (state.view === 'search') {
    // 칩 색만 바꾸고 결과만 갱신 (입력 포커스 유지)
    const chip = document.querySelector('.filter-chip');
    if (chip) { chip.classList.toggle('on', state.showOnlyOriginal); chip.textContent = state.showOnlyOriginal ? '✓ 원곡만 보기' : '원곡만 보기'; }
    renderSearchResults();
  } else render();
}
function toggleDropdown(id) {
  state.openDropdownId = state.openDropdownId === id ? null : id;
  if (state.view === 'search') renderSearchResults(); else render();
}
async function doSearch() {
  const q = state.searchInput.trim();
  if (!q) { state.searchResults = null; renderSearchResults(); return; }
  state.searchLoading = true; state.openDropdownId = null; renderSearchResults();
  try { state.searchResults = await searchYouTube(q); }
  catch (e) { state.searchResults = []; if (e.message==='NO_KEY') showToast('API 키를 먼저 입력해주세요'); else showToast('검색 오류: '+e.message.slice(0,40)); }
  state.searchLoading = false; renderSearchResults();
}
function showNewListInput() {
  const area = document.getElementById('newlist-area');
  area.innerHTML = `<div class="new-list-row"><input id="newlist-input" placeholder="리스트 이름 (예: 노동요)"><button onclick="confirmNewList()">추가</button></div>`;
  const inp = document.getElementById('newlist-input'); inp.focus();
  inp.onkeydown = (e) => { if (e.key === 'Enter') confirmNewList(); };
}
function confirmNewList() { const inp = document.getElementById('newlist-input'); if (inp && inp.value.trim()) createList(inp.value); }

document.addEventListener('click', (e) => {
  if (state.openDropdownId && !e.target.closest('.add-wrap')) {
    state.openDropdownId = null;
    if (state.view === 'search') renderSearchResults(); else render();
  }
}, true);

function init() {
  const hour = new Date().getHours();
  if (hour >= 6 && hour < 17) state.mood = MOOD_BY_TIME.morning;
  else if (hour >= 17 && hour < 20) state.mood = MOOD_BY_TIME.evening;
  else state.mood = MOOD_BY_TIME.night;
  loadData(); render(); loadRecommended(); loadForYou();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
}
init();
</script>
</body>
</html>
