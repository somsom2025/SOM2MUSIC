<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SOM2MUSIC">
<title>SOM2MUSIC</title>
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FAFAF8; --ink: #2B2B28; --sub: #8A8578; --line: #EAE7DD;
    --card: #FFFFFF; --accent: #C97B4A; --muted: #9C9A8E;
  }
  html, body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); background: var(--bg); }
  body { min-height: 100vh; padding-bottom: 150px; }
  #player-host { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; left: -9999px; }

  .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 32px 24px 20px; transition: background 0.6s; }
  .brand { font-size: 12px; letter-spacing: 0.12em; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
  .title { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
  .title-sm { font-size: 22px; font-weight: 700; }
  .subtitle { font-size: 13px; color: #71705f; margin-top: 4px; }

  .main { padding: 8px 24px 24px; }
  .section + .section { margin-top: 28px; }
  .section-label { font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 10px; }
  .track-list { display: flex; flex-direction: column; gap: 8px; }

  .track-row { display: flex; justify-content: space-between; align-items: center; width: 100%; text-align: left;
    border: none; background: var(--card); border-radius: 14px; padding: 18px 16px; cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04); font-family: inherit; }
  .track-row.active { background: rgba(43,43,40,0.06); }
  .track-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .track-title { font-size: 15px; font-weight: 600; color: var(--ink); }
  .track-artist { font-size: 12px; color: var(--sub); }
  .playing-dot { color: var(--accent); font-size: 10px; }
  .tag-warn { font-size: 11px; color: var(--accent); font-weight: 500; }

  .empty { font-size: 13px; color: #A6A398; padding: 24px 0; text-align: center; line-height: 1.6; }

  .search-input { width: 100%; border: 1px solid var(--line); background: var(--card); border-radius: 14px;
    padding: 14px 16px; font-size: 15px; margin-bottom: 10px; outline: none; font-family: inherit; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-chip { border: 1px solid var(--line); background: var(--card); color: #71705f; font-size: 12px;
    font-weight: 600; padding: 7px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; }
  .filter-chip.on { border: none; background: var(--ink); color: var(--bg); }

  .search-row { display: flex; align-items: center; gap: 8px; }
  .search-row-main { flex: 1; display: flex; text-align: left; border: none; background: var(--card);
    border-radius: 14px; padding: 16px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.04); min-width: 0; font-family: inherit; }
  .search-row-main.active { background: rgba(43,43,40,0.06); }
  .add-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--line); background: var(--card);
    font-size: 20px; color: var(--ink); cursor: pointer; flex-shrink: 0; }
  .add-wrap { position: relative; }
  .add-dropdown { position: absolute; right: 0; top: 46px; background: var(--card); border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.14); padding: 6px; z-index: 20; min-width: 150px; }
  .add-dropdown button { display: block; width: 100%; text-align: left; border: none; background: none;
    font-size: 14px; padding: 11px 12px; border-radius: 8px; cursor: pointer; color: var(--ink); font-family: inherit; }
  .add-dropdown .dd-empty { font-size: 12px; color: #A6A398; padding: 8px 10px; }

  .list-row { display: flex; justify-content: space-between; align-items: center; width: 100%; text-align: left;
    border: none; background: var(--card); border-radius: 14px; padding: 18px 16px; cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04); font-family: inherit; }
  .add-list-btn { width: 100%; border: 1px dashed #C9C5B8; background: none; border-radius: 14px; padding: 16px;
    font-size: 14px; font-weight: 600; color: var(--sub); cursor: pointer; margin-top: 10px; font-family: inherit; }
  .new-list-row { display: flex; gap: 8px; margin-top: 10px; }
  .new-list-row input { flex: 1; border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px;
    font-size: 14px; outline: none; font-family: inherit; }
  .new-list-row button { border: none; background: var(--ink); color: var(--bg); border-radius: 12px;
    padding: 0 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }

  .back-btn { border: none; background: none; font-size: 13px; color: var(--sub); cursor: pointer;
    padding: 0 0 14px; font-weight: 600; font-family: inherit; }
  .row-with-delete { display: flex; align-items: center; gap: 8px; }
  .row-inner { flex: 1; display: flex; text-align: left; border: none; background: var(--card); border-radius: 14px;
    padding: 18px 16px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.04); min-width: 0; font-family: inherit; }
  .row-inner.active { background: rgba(43,43,40,0.06); }
  .del-btn { border: none; background: none; color: #B0563D; font-size: 12px; font-weight: 600; cursor: pointer;
    flex-shrink: 0; padding: 10px; font-family: inherit; }
  .del-list-btn { width: 100%; border: none; background: none; color: #B0563D; font-size: 13px; font-weight: 600;
    cursor: pointer; margin-top: 18px; padding: 10px; font-family: inherit; }

  .player-bar { position: fixed; bottom: 72px; left: 0; right: 0; background: rgba(255,255,255,0.94);
    backdrop-filter: blur(12px); border-top: 1px solid var(--line); }
  .progress-track { height: 3px; background: var(--line); position: relative; }
  .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); transition: width 0.3s linear; }
  .player-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 18px; }
  .now-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .now-artist { font-size: 11px; color: var(--sub); }
  .controls { display: flex; align-items: center; gap: 16px; }
  .ctrl { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--ink); }
  .ctrl-main { border: none; background: var(--ink); color: var(--bg); width: 44px; height: 44px; border-radius: 50%;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 72px; background: var(--card);
    border-top: 1px solid var(--line); display: flex; padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 30; }
  .bottom-nav button { flex: 1; border: none; background: none; display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--muted); }
  .bottom-nav button.on { color: var(--ink); font-weight: 700; }

  .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); background: var(--ink);
    color: var(--bg); font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 20px; z-index: 50;
    opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .api-warn { margin: 16px 24px; padding: 14px 16px; background: #FBEEE6; border: 1px solid #EBC9B3;
    border-radius: 12px; font-size: 12px; color: #8A4B2A; line-height: 1.6; }
  .loading { font-size: 13px; color: var(--sub); padding: 24px 0; text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>
<div id="player-host"></div>
<div id="toast" class="toast"></div>

<header class="header" id="header">
  <div>
    <div class="brand">SOM2MUSIC</div>
    <div id="header-content"></div>
  </div>
</header>

<main class="main" id="main"></main>

<div id="player-bar"></div>

<nav class="bottom-nav" id="bottom-nav"></nav>

<script>
/* ============================================================
   SOM2MUSIC — 설정
   ============================================================ */

// ⬇⬇⬇ 여기에 본인의 YouTube Data API 키를 붙여넣으세요 ⬇⬇⬇
const YOUTUBE_API_KEY = "AIzaSyByOiNtafI7cRU-rJH39d3AcYOdwWcTnVY";
// ⬆⬆⬆ 예: const YOUTUBE_API_KEY = "AIzaSyB1a2c3..."; ⬆⬆⬆

/* ============================================================ */

const WEATHER_PRESETS = [
  { key: 'sunny',  label: '맑음', emoji: '\u2600\uFE0F', tint: '#F4D58D', text: '햇살 좋은 날엔 가볍게', q: '신나는 팝송' },
  { key: 'cloudy', label: '흐림', emoji: '\u2601\uFE0F', tint: '#B8C4CE', text: '흐린 하늘엔 잔잔하게', q: '잔잔한 어쿠스틱' },
  { key: 'rainy',  label: '비',   emoji: '\uD83C\uDF27\uFE0F', tint: '#7E94A8', text: '비 오는 날엔 차분하게', q: '비 오는 날 발라드' },
];

const EXCLUDE_KEYWORDS = ['cover','커버','live','라이브','lyrics','가사','remix','리믹스','모음','compilation','1시간','mix','매시업','mashup','reaction','리액션','노래방','mr','inst'];

// ---------- 상태 ----------
let state = {
  view: 'home',            // home | search | lists | listDetail
  weather: WEATHER_PRESETS[0],
  playlists: [],           // [{id, name, tracks:[{id,title,artist}]}]
  activeListId: null,
  searchInput: '',
  searchResults: null,
  searchLoading: false,
  showOnlyOriginal: true,
  recommended: [],         // 홈 추천곡
  recommendLoading: false,
  queue: [],
  currentIndex: -1,
  isPlaying: false,
  progress: 0,
  duration: 0,
  openDropdownId: null,
};

// ---------- 저장 (localStorage) ----------
const STORAGE_KEY = 'som2music_data_v1';
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ playlists: state.playlists }));
  } catch (e) {}
}
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (Array.isArray(data.playlists)) state.playlists = data.playlists;
    }
  } catch (e) {}
  if (state.playlists.length === 0) {
    state.playlists = [
      { id: 'pl_default1', name: '즐겨듣는 곡', tracks: [] },
    ];
  }
}

// ---------- YouTube 검색 ----------
function classifyTrack(track) {
  const title = (track.title || '').toLowerCase();
  const excluded = EXCLUDE_KEYWORDS.some(kw => title.includes(kw.toLowerCase()));
  return { ...track, likelyOriginal: !excluded };
}

function decodeHtml(str) {
  const txt = document.createElement('textarea');
  txt.innerHTML = str;
  return txt.value;
}

async function searchYouTube(query) {
  if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY.includes('붙여넣')) {
    throw new Error('NO_KEY');
  }
  const q = encodeURIComponent(query);
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=20&q=${q}&key=${YOUTUBE_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'API_ERROR');
  }
  const data = await res.json();
  return (data.items || []).map(item => classifyTrack({
    id: item.id.videoId,
    title: decodeHtml(item.snippet.title),
    artist: decodeHtml(item.snippet.channelTitle),
  }));
}

// ---------- YouTube 플레이어 ----------
let ytPlayer = null;
let ytReady = false;
(function loadYT() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.body.appendChild(tag);
})();
window.onYouTubeIframeAPIReady = function () {
  ytPlayer = new YT.Player('player-host', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0 },
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.ENDED) playNext();
        state.isPlaying = (e.data === YT.PlayerState.PLAYING);
        renderPlayerBar();
      },
    },
  });
};

setInterval(() => {
  if (ytPlayer && ytPlayer.getCurrentTime) {
    try {
      state.progress = ytPlayer.getCurrentTime() || 0;
      state.duration = ytPlayer.getDuration() || 0;
      updateProgressBar();
    } catch (e) {}
  }
}, 500);

function playTrackAt(list, index) {
  state.queue = list;
  state.currentIndex = index;
  const track = list[index];
  if (track && ytPlayer && ytPlayer.loadVideoById) {
    ytPlayer.loadVideoById(track.id);
    ytPlayer.playVideo();
  }
  renderPlayerBar();
  render();
}
function playNext() {
  if (state.currentIndex < 0 || state.queue.length === 0) return;
  playTrackAt(state.queue, (state.currentIndex + 1) % state.queue.length);
}
function playPrev() {
  if (state.currentIndex < 0 || state.queue.length === 0) return;
  playTrackAt(state.queue, (state.currentIndex - 1 + state.queue.length) % state.queue.length);
}
function togglePlay() {
  if (!ytPlayer) return;
  state.isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

// ---------- 리스트 조작 ----------
function addToList(listId, track) {
  const list = state.playlists.find(l => l.id === listId);
  if (!list) return;
  if (!list.tracks.some(t => t.id === track.id)) {
    list.tracks.push({ id: track.id, title: track.title, artist: track.artist });
    saveData();
  }
  showToast(`"${list.name}"에 추가했어요`);
  state.openDropdownId = null;
  render();
}
function removeFromList(listId, trackId) {
  const list = state.playlists.find(l => l.id === listId);
  if (!list) return;
  list.tracks = list.tracks.filter(t => t.id !== trackId);
  saveData();
  render();
}
function createList(name) {
  if (!name.trim()) return;
  state.playlists.push({ id: 'pl_' + Date.now(), name: name.trim(), tracks: [] });
  saveData();
  showToast(`"${name.trim()}" 리스트를 만들었어요`);
  render();
}
function deleteList(listId) {
  state.playlists = state.playlists.filter(l => l.id !== listId);
  saveData();
  state.view = 'lists';
  render();
}

// ---------- 추천곡 (홈) ----------
async function loadRecommended() {
  if (state.recommendLoading) return;
  state.recommendLoading = true;
  render();
  try {
    state.recommended = await searchYouTube(state.weather.q);
    state.recommended = state.recommended.filter(t => t.likelyOriginal).slice(0, 6);
  } catch (e) {
    state.recommended = [];
  }
  state.recommendLoading = false;
  render();
}

// ---------- UI 유틸 ----------
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---------- 렌더링 ----------
function render() {
  const cur = state.currentIndex >= 0 ? state.queue[state.currentIndex] : null;
  document.getElementById('header').style.background =
    `linear-gradient(180deg, ${state.weather.tint}33 0%, transparent 100%)`;

  // 헤더
  const hc = document.getElementById('header-content');
  if (state.view === 'home') {
    hc.innerHTML = `<h1 class="title">${state.weather.emoji} ${state.weather.label}</h1><p class="subtitle">${state.weather.text}</p>`;
  } else if (state.view === 'search') {
    hc.innerHTML = `<h1 class="title-sm">검색</h1>`;
  } else if (state.view === 'lists') {
    hc.innerHTML = `<h1 class="title-sm">내 리스트</h1>`;
  } else if (state.view === 'listDetail') {
    const l = state.playlists.find(x => x.id === state.activeListId);
    hc.innerHTML = `<h1 class="title-sm">${esc(l ? l.name : '')}</h1>`;
  }

  // 본문
  const main = document.getElementById('main');
  let html = '';

  if (state.view === 'home') {
    html += `<section class="section"><div class="section-label">${state.weather.label}에 어울리는 곡</div><div class="track-list">`;
    if (state.recommendLoading) {
      html += `<div class="loading">추천곡을 불러오는 중…</div>`;
    } else if (state.recommended.length === 0) {
      html += `<div class="empty">추천곡을 불러오지 못했어요.<br><span style="font-size:11px">API 키를 입력했는지 확인해주세요.</span></div>`;
    } else {
      state.recommended.forEach((t, i) => {
        html += trackRowHtml(t, cur && cur.id === t.id, `playTrackAt(state.recommended, ${i})`);
      });
    }
    html += `</div></section>`;
  }

  if (state.view === 'search') {
    html += `
      <input class="search-input" id="search-input" placeholder="성시경, 노동요, 락, 발라드..." value="${esc(state.searchInput)}">
      <div class="filter-row">
        <button class="filter-chip ${state.showOnlyOriginal ? 'on' : ''}" onclick="toggleOriginal()">
          ${state.showOnlyOriginal ? '✓ 원곡만 보기' : '원곡만 보기'}
        </button>
      </div>`;
    if (state.searchLoading) {
      html += `<div class="loading">검색 중…</div>`;
    } else if (state.searchResults) {
      const vis = state.showOnlyOriginal ? state.searchResults.filter(t => t.likelyOriginal) : state.searchResults;
      if (vis.length === 0) {
        html += `<div class="empty">결과가 없어요.</div>`;
      } else {
        html += `<div class="track-list">`;
        vis.forEach((t, i) => { html += searchRowHtml(t, cur && cur.id === t.id, i); });
        html += `</div>`;
      }
    }
  }

  if (state.view === 'lists') {
    html += `<div class="track-list">`;
    state.playlists.forEach(l => {
      html += `<button class="list-row" onclick="openList('${l.id}')">
        <div class="track-info"><div class="track-title">${esc(l.name)}</div><div class="track-artist">${l.tracks.length}곡</div></div>
        <span style="color:#A6A398">›</span></button>`;
    });
    if (state.playlists.length === 0) html += `<div class="empty">아직 만든 리스트가 없어요.</div>`;
    html += `</div>
      <div id="newlist-area">
        <button class="add-list-btn" onclick="showNewListInput()">+ 새 리스트 만들기</button>
      </div>`;
  }

  if (state.view === 'listDetail') {
    const l = state.playlists.find(x => x.id === state.activeListId);
    html += `<button class="back-btn" onclick="go('lists')">‹ 내 리스트</button>`;
    if (l) {
      html += `<div class="track-list">`;
      l.tracks.forEach((t, i) => {
        const active = cur && cur.id === t.id ? 'active' : '';
        html += `<div class="row-with-delete">
          <button class="row-inner ${active}" onclick="playFromList('${l.id}', ${i})">
            <div class="track-info"><div class="track-title">${esc(t.title)}</div><div class="track-artist">${esc(t.artist)}</div></div>
          </button>
          <button class="del-btn" onclick="removeFromList('${l.id}','${t.id}')">제외</button>
        </div>`;
      });
      if (l.tracks.length === 0) html += `<div class="empty">곡을 검색해서 추가해보세요.</div>`;
      html += `</div><button class="del-list-btn" onclick="deleteList('${l.id}')">리스트 삭제</button>`;
    }
  }

  main.innerHTML = html;

  // 검색 입력 이벤트 재바인딩
  const si = document.getElementById('search-input');
  if (si) {
    si.oninput = (e) => { state.searchInput = e.target.value; };
    si.onkeydown = (e) => { if (e.key === 'Enter') doSearch(); };
    si.onblur = () => {}; // 유지
    // 엔터 외에도 입력 멈추면 자동 검색
    clearTimeout(si._t);
    si.oninput = (e) => {
      state.searchInput = e.target.value;
      clearTimeout(si._t);
      si._t = setTimeout(() => doSearch(), 600);
    };
  }

  renderNav();
  renderPlayerBar();
}

function trackRowHtml(t, active, onclick) {
  return `<button class="track-row ${active ? 'active' : ''}" onclick="${onclick}">
    <div class="track-info"><div class="track-title">${esc(t.title)}</div><div class="track-artist">${esc(t.artist)}</div></div>
    ${active ? '<span class="playing-dot">●</span>' : ''}
  </button>`;
}

function searchRowHtml(t, active, i) {
  const open = state.openDropdownId === t.id;
  let dd = '';
  if (open) {
    dd = `<div class="add-dropdown">`;
    if (state.playlists.length === 0) dd += `<div class="dd-empty">리스트를 먼저 만들어주세요</div>`;
    state.playlists.forEach(l => {
      dd += `<button onclick="addToList('${l.id}', ${escAttr(t)})">${esc(l.name)}</button>`;
    });
    dd += `</div>`;
  }
  return `<div class="search-row">
    <button class="search-row-main ${active ? 'active' : ''}" onclick="playFromSearch(${i})">
      <div class="track-info">
        <div class="track-title">${esc(t.title)}${!t.likelyOriginal ? '<span class="tag-warn"> · 원곡 아닐 수 있음</span>' : ''}</div>
        <div class="track-artist">${esc(t.artist)}</div>
      </div>
    </button>
    <div class="add-wrap">
      <button class="add-btn" onclick="toggleDropdown('${t.id}')">+</button>
      ${dd}
    </div>
  </div>`;
}

function escAttr(t) {
  return JSON.stringify({ id: t.id, title: t.title, artist: t.artist }).replace(/"/g, '&quot;');
}

function renderNav() {
  const nav = document.getElementById('bottom-nav');
  const tabs = [
    { key: 'home', label: '홈' },
    { key: 'search', label: '검색' },
    { key: 'lists', label: '내 리스트' },
  ];
  nav.innerHTML = tabs.map(t => {
    const on = state.view === t.key || (t.key === 'lists' && state.view === 'listDetail');
    return `<button class="${on ? 'on' : ''}" onclick="go('${t.key}')">${t.label}</button>`;
  }).join('');
}

function renderPlayerBar() {
  const bar = document.getElementById('player-bar');
  const cur = state.currentIndex >= 0 ? state.queue[state.currentIndex] : null;
  if (!cur) { bar.innerHTML = ''; return; }
  const pct = state.duration ? (state.progress / state.duration) * 100 : 0;
  bar.innerHTML = `<div class="player-bar">
    <div class="progress-track"><div class="progress-fill" id="pfill" style="width:${pct}%"></div></div>
    <div class="player-row">
      <div class="now-playing">
        <div class="now-title">${esc(cur.title)}</div>
        <div class="now-artist">${esc(cur.artist)} · ${fmtTime(state.progress)} / ${fmtTime(state.duration)}</div>
      </div>
      <div class="controls">
        <button class="ctrl" onclick="playPrev()">⏮</button>
        <button class="ctrl-main" onclick="togglePlay()">${state.isPlaying ? '⏸' : '▶'}</button>
        <button class="ctrl" onclick="playNext()">⏭</button>
      </div>
    </div>
  </div>`;
}
function updateProgressBar() {
  const fill = document.getElementById('pfill');
  if (fill && state.duration) fill.style.width = ((state.progress / state.duration) * 100) + '%';
  // 시간 텍스트도 갱신
  const cur = state.currentIndex >= 0 ? state.queue[state.currentIndex] : null;
  if (cur) {
    const na = document.querySelector('.now-artist');
    if (na) na.textContent = `${cur.artist} · ${fmtTime(state.progress)} / ${fmtTime(state.duration)}`;
  }
}

// ---------- 액션 핸들러 (전역) ----------
function go(view) {
  state.view = view;
  state.openDropdownId = null;
  if (view === 'home' && state.recommended.length === 0 && !state.recommendLoading) {
    loadRecommended();
  } else {
    render();
  }
}
function openList(id) { state.activeListId = id; state.view = 'listDetail'; render(); }
function playFromSearch(i) {
  const vis = state.showOnlyOriginal ? state.searchResults.filter(t => t.likelyOriginal) : state.searchResults;
  playTrackAt(vis, i);
}
function playFromList(listId, i) {
  const l = state.playlists.find(x => x.id === listId);
  if (l) playTrackAt(l.tracks, i);
}
function toggleOriginal() { state.showOnlyOriginal = !state.showOnlyOriginal; render(); }
function toggleDropdown(id) { state.openDropdownId = state.openDropdownId === id ? null : id; render(); }
async function doSearch() {
  const q = state.searchInput.trim();
  if (!q) { state.searchResults = null; render(); return; }
  state.searchLoading = true;
  state.openDropdownId = null;
  render();
  try {
    state.searchResults = await searchYouTube(q);
  } catch (e) {
    state.searchResults = [];
    if (e.message === 'NO_KEY') {
      showToast('API 키를 먼저 입력해주세요');
    } else {
      showToast('검색 오류: ' + e.message.slice(0, 40));
    }
  }
  state.searchLoading = false;
  render();
}
function showNewListInput() {
  const area = document.getElementById('newlist-area');
  area.innerHTML = `<div class="new-list-row">
    <input id="newlist-input" placeholder="리스트 이름 (예: 노동요)" autofocus>
    <button onclick="confirmNewList()">추가</button>
  </div>`;
  const inp = document.getElementById('newlist-input');
  inp.focus();
  inp.onkeydown = (e) => { if (e.key === 'Enter') confirmNewList(); };
}
function confirmNewList() {
  const inp = document.getElementById('newlist-input');
  if (inp && inp.value.trim()) createList(inp.value);
}

// 바깥 클릭 시 드롭다운 닫기
document.addEventListener('click', (e) => {
  if (state.openDropdownId && !e.target.closest('.add-wrap')) {
    state.openDropdownId = null;
    render();
  }
}, true);

// ---------- 초기화 ----------
function init() {
  const hour = new Date().getHours();
  if (hour >= 6 && hour < 17) state.weather = WEATHER_PRESETS[0];
  else if (hour >= 17 && hour < 20) state.weather = WEATHER_PRESETS[1];
  else state.weather = WEATHER_PRESETS[2];

  loadData();
  render();
  loadRecommended();

  // PWA 서비스워커 등록
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}
init();
</script>
</body>
</html>
